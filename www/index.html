<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MCQ Practice">
<title>MCQ Practice</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #273549;
    --accent: #6366f1;
    --accent2: #4f46e5;
    --good: #22c55e;
    --bad: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overscroll-behavior: none;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding: 16px; padding-bottom: 90px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-top: 8px; }
  h1 { font-size: 20px; margin: 0; }
  .subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }
  .card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
  .btn {
    background: var(--accent); color: white; border: none; border-radius: 12px;
    padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%;
    transition: transform 0.1s, background 0.2s;
  }
  .btn:active { transform: scale(0.97); background: var(--accent2); }
  .btn.secondary { background: var(--card2); }
  .btn.danger { background: var(--bad); }
  .btn.small { padding: 10px; font-size: 14px; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  input[type=text], textarea {
    width: 100%; background: var(--card2); border: 1px solid #334155; color: var(--text);
    border-radius: 10px; padding: 12px; font-size: 15px; margin-bottom: 10px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 60px; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
  .option-input { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .option-input input[type=text] { margin-bottom: 0; }
  .radio-circle {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid #475569;
    flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .radio-circle.checked { border-color: var(--good); }
  .radio-circle.checked::after { content: ''; width: 11px; height: 11px; background: var(--good); border-radius: 50%; }
  .qcard { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .qcount { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .qtext { font-size: 18px; font-weight: 600; margin-bottom: 18px; line-height: 1.4; }
  .option {
    background: var(--card2); border: 2px solid transparent; border-radius: 12px;
    padding: 14px; margin-bottom: 10px; cursor: pointer; font-size: 15px; transition: all 0.15s;
  }
  .option.correct { border-color: var(--good); background: #14532d; }
  .option.wrong { border-color: var(--bad); background: #450a0a; }
  .option.disabled { pointer-events: none; }
  .score-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .score-pill { background: var(--card2); padding: 6px 14px; border-radius: 999px; font-size: 14px; font-weight: 600; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .list-item {
    background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .list-item .qtitle { font-size: 14px; flex: 1; }
  .icon-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
    display: flex; padding: 8px 16px calc(8px + env(safe-area-inset-bottom)); border-top: 1px solid #334155;
    max-width: 480px; margin: 0 auto;
  }
  .tab { flex: 1; text-align: center; padding: 8px; color: var(--muted); font-size: 12px; cursor: pointer; border-radius: 10px; }
  .tab.active { color: var(--accent); }
  .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }
  .result-emoji { font-size: 56px; text-align: center; margin-bottom: 8px; }
  .result-text { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .result-sub { text-align: center; color: var(--muted); margin-bottom: 20px; }
  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 10px 20px; border-radius: 999px;
    font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1 id="headerTitle">MCQ Practice</h1>
      <div class="subtitle" id="headerSub">Build your own practice quizzes</div>
    </div>
  </header>

  <!-- HOME / LIST SCREEN -->
  <div class="screen active" id="screen-home">
    <div id="questionList"></div>
    <div class="empty" id="emptyState" style="display:none;">
      <div class="empty-icon">📝</div>
      <div>No questions yet.<br>Tap "Add Question" to create your first one.</div>
    </div>
    <div style="margin-top:8px;">
      <button class="btn" onclick="goTo('add')">+ Add Question</button>
    </div>
  </div>

  <!-- ADD QUESTION SCREEN -->
  <div class="screen" id="screen-add">
    <div class="card">
      <label>Question</label>
      <textarea id="qInput" placeholder="e.g. What is the capital of France?"></textarea>
      <label>Options (tap circle to mark correct answer)</label>
      <div id="optionsContainer"></div>
    </div>
    <div class="row">
      <button class="btn secondary" onclick="goTo('home')">Cancel</button>
      <button class="btn" onclick="saveQuestion()">Save Question</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screen-quiz">
    <div class="score-bar">
      <span class="score-pill" id="quizProgress">1 / 5</span>
      <span class="score-pill" id="quizScore">Score: 0</span>
    </div>
    <div id="quizArea"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screen-result">
    <div class="card" style="margin-top: 40px;">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <div class="result-text" id="resultText">Great job!</div>
      <div class="result-sub" id="resultSub">You scored 4/5</div>
      <button class="btn" onclick="goTo('home')">Back to Questions</button>
    </div>
  </div>
</div>

<div class="tabbar">
  <div class="tab active" id="tab-home" onclick="goTo('home')">
    <span class="tab-icon">📚</span>My Questions
  </div>
  <div class="tab" id="tab-quiz" onclick="startQuiz()">
    <span class="tab-icon">🎯</span>Practice
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let questions = [];
let currentOptions = [{text:'', correct:false},{text:'', correct:false},{text:'', correct:false},{text:'', correct:false}];
let quizQueue = [];
let quizIndex = 0;
let quizScore = 0;
let answered = false;

const STORAGE_KEY = 'mcq-questions-v1';

async function loadQuestions() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    questions = raw ? JSON.parse(raw) : [];
  } catch (e) {
    questions = [];
  }
  renderList();
}

async function persistQuestions() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));
  } catch (e) {
    showToast('Save failed, try again');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.getElementById('tab-home').classList.toggle('active', screen === 'home');
  document.getElementById('tab-quiz').classList.toggle('active', screen === 'quiz' || screen === 'result');

  if (screen === 'home') {
    document.getElementById('headerTitle').textContent = 'MCQ Practice';
    document.getElementById('headerSub').textContent = 'Build your own practice quizzes';
    renderList();
  }
  if (screen === 'add') {
    document.getElementById('headerTitle').textContent = 'New Question';
    document.getElementById('headerSub').textContent = 'Mark one option as correct';
    resetAddForm();
  }
}

function renderList() {
  const container = document.getElementById('questionList');
  const empty = document.getElementById('emptyState');
  container.innerHTML = '';
  if (questions.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  questions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `<span class="qtitle">${escapeHtml(q.text)}</span><button class="icon-btn" onclick="deleteQuestion(${i})">🗑️</button>`;
    container.appendChild(div);
  });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function deleteQuestion(i) {
  questions.splice(i, 1);
  persistQuestions();
  renderList();
}

function resetAddForm() {
  document.getElementById('qInput').value = '';
  currentOptions = [{text:'', correct:false},{text:'', correct:false},{text:'', correct:false},{text:'', correct:false}];
  renderOptionInputs();
}

function renderOptionInputs() {
  const c = document.getElementById('optionsContainer');
  c.innerHTML = '';
  currentOptions.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'option-input';
    row.innerHTML = `
      <div class="radio-circle ${opt.correct ? 'checked' : ''}" onclick="setCorrect(${i})"></div>
      <input type="text" placeholder="Option ${i+1}" value="${escapeHtml(opt.text)}" oninput="currentOptions[${i}].text = this.value">
    `;
    c.appendChild(row);
  });
}

function setCorrect(i) {
  currentOptions.forEach((o, idx) => o.correct = (idx === i));
  renderOptionInputs();
}

function saveQuestion() {
  const text = document.getElementById('qInput').value.trim();
  if (!text) { showToast('Enter a question'); return; }
  const filled = currentOptions.filter(o => o.text.trim() !== '');
  if (filled.length < 2) { showToast('Add at least 2 options'); return; }
  if (!currentOptions.some(o => o.correct && o.text.trim() !== '')) { showToast('Mark the correct answer'); return; }

  questions.push({
    text,
    options: filled.map(o => o.text.trim()),
    correctIndex: filled.findIndex(o => o.correct)
  });
  persistQuestions();
  showToast('Question saved!');
  goTo('home');
}

function startQuiz() {
  if (questions.length === 0) {
    showToast('Add some questions first');
    goTo('home');
    return;
  }
  quizQueue = [...questions].sort(() => Math.random() - 0.5);
  quizIndex = 0;
  quizScore = 0;
  answered = false;
  document.getElementById('headerTitle').textContent = 'Practice';
  document.getElementById('headerSub').textContent = 'Pick the correct answer';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-quiz').classList.add('active');
  document.getElementById('tab-quiz').classList.add('active');
  document.getElementById('tab-home').classList.remove('active');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  answered = false;
  const q = quizQueue[quizIndex];
  document.getElementById('quizProgress').textContent = `${quizIndex+1} / ${quizQueue.length}`;
  document.getElementById('quizScore').textContent = `Score: ${quizScore}`;
  const area = document.getElementById('quizArea');
  const shuffledOptions = q.options.map((text, i) => ({text, isCorrect: i === q.correctIndex}));
  shuffledOptions.sort(() => Math.random() - 0.5);

  area.innerHTML = `
    <div class="qcard">
      <div class="qtext">${escapeHtml(q.text)}</div>
      <div id="optsWrap"></div>
    </div>
  `;
  const wrap = document.getElementById('optsWrap');
  shuffledOptions.forEach((opt) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = opt.text;
    div.onclick = () => selectAnswer(div, opt.isCorrect, wrap);
    wrap.appendChild(div);
  });
}

function selectAnswer(el, isCorrect, wrap) {
  if (answered) return;
  answered = true;
  if (isCorrect) quizScore++;
  Array.from(wrap.children).forEach(child => {
    child.classList.add('disabled');
  });
  el.classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById('quizScore').textContent = `Score: ${quizScore}`;

  setTimeout(() => {
    quizIndex++;
    if (quizIndex < quizQueue.length) {
      renderQuizQuestion();
    } else {
      showResult();
    }
  }, 900);
}

function showResult() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-result').classList.add('active');
  document.getElementById('headerTitle').textContent = 'Results';
  document.getElementById('headerSub').textContent = '';
  const pct = Math.round((quizScore / quizQueue.length) * 100);
  const emoji = pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 40 ? '👍' : '💪';
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultText').textContent =
    pct === 100 ? 'Perfect score!' : pct >= 70 ? 'Great job!' : pct >= 40 ? 'Good effort!' : 'Keep practicing!';
  document.getElementById('resultSub').textContent = `You scored ${quizScore} / ${quizQueue.length} (${pct}%)`;
}

loadQuestions();
</script>
</body>
</html>
