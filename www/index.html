<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>শিক্ষক নিবন্ধন জীববিজ্ঞান প্র্যাকটিস</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c2b22;
  --forest:#1f4d3a;
  --forest-light:#2c6a4e;
  --moss:#4c7a5e;
  --paper:#f6f2e7;
  --paper-2:#efe8d6;
  --card:#fffdf7;
  --amber:#c98a3d;
  --amber-deep:#a86a26;
  --leaf:#4a8a5c;
  --leaf-deep:#2f6b41;
  --rust:#b5482f;
  --rust-deep:#8f3722;
  --line:#dcd3ba;
  --shadow: 0 1px 2px rgba(28,43,34,.06), 0 8px 24px rgba(28,43,34,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(28,43,34,0.05) 1px, transparent 0);
  background-size: 22px 22px;
  color:var(--ink);
  font-family:'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.font-display{font-family:'Baloo Da 2','Hind Siliguri',sans-serif;}
.font-mono{font-family:'JetBrains Mono', monospace;}

#app{max-width:860px;margin:0 auto;padding:18px 16px 64px;}

/* ---------- top bar ---------- */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:6px 2px 18px;
}
.topbar .leaf-badge{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(155deg,var(--forest),var(--forest-light));
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);
  flex-shrink:0;
}
.topbar h1{
  font-family:'Baloo Da 2',sans-serif;
  font-size:20px;font-weight:700;color:var(--forest);margin:0;line-height:1.2;
}
.topbar .sub{font-size:12.5px;color:var(--moss);margin-top:1px;}
.topbar .back-btn{
  margin-left:auto;
  border:none;background:var(--card);color:var(--forest);
  font-family:'Hind Siliguri',sans-serif;font-weight:600;font-size:14px;
  padding:9px 14px;border-radius:10px;cursor:pointer;
  box-shadow:var(--shadow);
  display:flex;align-items:center;gap:6px;
}
.topbar .back-btn:active{transform:scale(0.97);}

/* ---------- home ---------- */
.hero{
  background:linear-gradient(160deg,var(--forest) 0%, var(--forest-light) 60%, var(--leaf) 130%);
  border-radius:20px;padding:22px 20px;color:#f5f1e2;position:relative;overflow:hidden;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}
.hero::after{
  content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
}
.hero .eyebrow{font-size:12px;letter-spacing:.08em;color:#cfe3d3;font-weight:600;font-family:'Hind Siliguri';}
.hero h2{font-family:'Baloo Da 2';font-size:25px;margin:6px 0 8px;line-height:1.35;}
.hero p{font-size:13.5px;color:#dfeee1;margin:0;line-height:1.6;max-width:46ch;}
.hero .stat-row{display:flex;gap:18px;margin-top:16px;flex-wrap:wrap;}
.hero .stat{font-family:'JetBrains Mono';}
.hero .stat b{font-size:20px;display:block;}
.hero .stat span{font-size:11px;color:#cfe3d3;}

.section-label{
  font-size:12.5px;font-weight:700;color:var(--moss);letter-spacing:.03em;
  margin:22px 4px 10px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:"";flex:1;height:1px;background:var(--line);}

.unit-grid{display:grid;grid-template-columns:1fr;gap:10px;}
.unit-card{
  background:var(--card);border-radius:16px;padding:14px 14px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  transition:transform .12s ease, box-shadow .12s ease;
  text-align:left;
}
.unit-card:active{transform:scale(0.985);}
.unit-ring{flex-shrink:0;position:relative;width:52px;height:52px;}
.unit-ring svg{transform:rotate(-90deg);}
.unit-ring .num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono';font-weight:700;font-size:15px;color:var(--forest);
}
.unit-info{flex:1;min-width:0;}
.unit-info h3{font-family:'Baloo Da 2';font-size:15.5px;margin:0 0 4px;color:var(--ink);font-weight:600;line-height:1.3;}
.unit-info .meta{font-size:12px;color:var(--moss);font-family:'Hind Siliguri';display:flex;gap:8px;flex-wrap:wrap;}
.unit-info .meta b{color:var(--amber-deep);font-weight:700;}
.chev{color:var(--moss);flex-shrink:0;}

/* ---------- unit hub ---------- */
.unit-header{
  background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:18px;margin-bottom:16px;box-shadow:var(--shadow);
}
.unit-header .tag{
  display:inline-block;font-family:'JetBrains Mono';font-size:11px;font-weight:700;
  color:var(--forest);background:var(--paper-2);padding:3px 9px;border-radius:20px;margin-bottom:8px;
}
.unit-header h2{font-family:'Baloo Da 2';font-size:21px;margin:0 0 6px;color:var(--ink);}
.unit-header .desc{font-size:13px;color:var(--moss);}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.mode-card{
  background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 14px;
  cursor:pointer;box-shadow:var(--shadow);transition:transform .12s;
}
.mode-card:active{transform:scale(0.97);}
.mode-card .icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.mode-card h4{font-family:'Baloo Da 2';font-size:15px;margin:0 0 4px;color:var(--ink);}
.mode-card p{font-size:11.5px;color:var(--moss);margin:0;line-height:1.5;}
.mode-card.full{grid-column:1/-1;display:flex;align-items:center;gap:14px;}
.mode-card.full .icon{margin-bottom:0;flex-shrink:0;}

/* ---------- study list ---------- */
.qcard{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow);
}
.qcard .qnum{
  font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--amber-deep);
  background:#fbf0dd;display:inline-block;padding:1px 7px;border-radius:20px;margin-bottom:5px;
}
.qcard .qtext{font-size:13.5px;font-weight:600;line-height:1.4;margin-bottom:7px;color:var(--ink);}
.opt-btn{
  display:block;width:100%;text-align:right;
  background:var(--paper);border:1.3px solid var(--line);border-radius:9px;
  padding:6px 10px;margin-bottom:5px;font-size:12.5px;font-family:'Hind Siliguri';
  cursor:pointer;color:var(--ink);line-height:1.35;
  transition:all .12s;
}
.opt-btn:active{transform:scale(0.99);}
.opt-btn .lbl{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:6px;background:var(--paper-2);
  font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--moss);
  margin-left:8px;flex-shrink:0;
}
.opt-row{display:flex;align-items:center;justify-content:flex-end;gap:0;}
.opt-btn.correct{background:#e7f4e9;border-color:var(--leaf);color:var(--leaf-deep);font-weight:600;}
.opt-btn.correct .lbl{background:var(--leaf);color:#fff;}
.opt-btn.wrong{background:#fbe9e5;border-color:var(--rust);color:var(--rust-deep);font-weight:600;}
.opt-btn.wrong .lbl{background:var(--rust);color:#fff;}
.opt-btn.dim{opacity:.55;}
.opt-btn.disabled{cursor:default;}
.explain{
  margin-top:6px;padding:8px 10px;background:#fbf6e8;border-radius:9px;
  border-right:3px solid var(--amber);font-size:12px;line-height:1.45;color:#4a3c22;
  animation:fade .25s ease;
}
.explain b{color:var(--amber-deep);}
@keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ---------- edit ---------- */
.edit-btn{
  border:1px solid var(--line);background:var(--paper);color:var(--moss);
  width:30px;height:30px;border-radius:9px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.edit-btn:active{transform:scale(0.93);}
.edit-card{border-color:var(--amber);}
.edit-field{margin-bottom:12px;}
.edit-field label{display:block;font-size:11.5px;font-weight:700;color:var(--amber-deep);margin-bottom:4px;font-family:'JetBrains Mono';}
.edit-field textarea{
  width:100%;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;
  font-family:'Hind Siliguri',sans-serif;font-size:14px;color:var(--ink);background:var(--paper);
  resize:vertical;line-height:1.5;
}
.edit-field textarea:focus{outline:none;border-color:var(--amber);}
.pill.correct-pill{padding:8px 14px;}
.edit-card .exam-nav{flex-wrap:wrap;}
.edit-card .exam-nav button{flex:1 1 auto;min-width:110px;font-size:13.5px;padding:11px 10px;}

/* ---------- exam ---------- */
.exam-config{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 20px;}
.pill{
  padding:9px 16px;border-radius:20px;border:1.5px solid var(--line);background:var(--paper);
  font-size:13.5px;font-weight:600;cursor:pointer;color:var(--ink);font-family:'Hind Siliguri';
}
.pill.active{background:var(--forest);border-color:var(--forest);color:#fff;}
.big-btn{
  width:100%;padding:14px;border:none;border-radius:13px;background:var(--forest);color:#fff;
  font-family:'Baloo Da 2';font-size:16px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);
}
.big-btn:active{transform:scale(0.98);}
.big-btn.amber{background:linear-gradient(135deg,var(--amber),var(--amber-deep));}
.big-btn.ghost{background:var(--card);color:var(--forest);border:1.5px solid var(--forest);}

.exam-top{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);position:sticky;top:8px;z-index:10;}
.timer{font-family:'JetBrains Mono';font-weight:700;font-size:16px;color:var(--rust-deep);display:flex;align-items:center;gap:6px;}
.progress-track{height:6px;background:var(--paper-2);border-radius:6px;overflow:hidden;flex:1;margin:0 14px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--leaf),var(--forest));border-radius:6px;transition:width .3s;}
.qof{font-family:'JetBrains Mono';font-size:12.5px;color:var(--moss);white-space:nowrap;}

.exam-opt{
  display:block;width:100%;text-align:right;background:var(--card);border:1.5px solid var(--line);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;font-size:15px;cursor:pointer;color:var(--ink);
  font-family:'Hind Siliguri';box-shadow:var(--shadow);
}
.exam-opt.selected{border-color:var(--forest);background:#eaf3ec;font-weight:600;}
.exam-nav{display:flex;gap:10px;margin-top:16px;}
.exam-nav button{flex:1;}

.result-hero{
  background:linear-gradient(160deg,var(--forest),var(--leaf-deep));color:#f5f1e2;border-radius:20px;
  padding:26px 20px;text-align:center;box-shadow:var(--shadow);margin-bottom:18px;
}
.result-hero .score{font-family:'Baloo Da 2';font-size:44px;font-weight:700;}
.result-hero .label{font-size:13px;color:#d8ead9;margin-top:2px;}
.result-stats{display:flex;justify-content:center;gap:18px;margin-top:16px;flex-wrap:wrap;}
.result-stats div b{display:block;font-family:'JetBrains Mono';font-size:18px;}
.result-stats div span{font-size:11px;color:#d8ead9;}

.review-item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.review-item .q{font-weight:600;font-size:14.5px;margin-bottom:8px;}
.review-item .row{font-size:13px;margin-bottom:4px;padding:6px 10px;border-radius:8px;}
.review-item .row.your-wrong{background:#fbe9e5;color:var(--rust-deep);}
.review-item .row.correct-ans{background:#e7f4e9;color:var(--leaf-deep);}
.review-item .exp{font-size:12.5px;color:var(--moss);margin-top:6px;line-height:1.55;}

/* ---------- stats ---------- */
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.stat-card h4{font-family:'Baloo Da 2';font-size:14.5px;margin:0 0 8px;}
.bar-track{height:9px;background:var(--paper-2);border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--leaf));}
.stat-nums{display:flex;justify-content:space-between;font-size:11.5px;color:var(--moss);margin-top:6px;font-family:'JetBrains Mono';}

/* ---------- ai ---------- */
.ai-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-row{display:flex;gap:6px;background:var(--paper-2);padding:4px;border-radius:12px;margin-bottom:16px;}
.tab-btn{flex:1;padding:9px;border:none;background:transparent;border-radius:9px;font-family:'Hind Siliguri';font-weight:600;font-size:13.5px;cursor:pointer;color:var(--moss);}
.tab-btn.active{background:var(--card);color:var(--forest);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.ai-badge{font-family:'JetBrains Mono';font-size:10px;background:#e5f0e8;color:var(--leaf-deep);padding:2px 7px;border-radius:20px;margin-right:6px;}

.empty{text-align:center;padding:40px 20px;color:var(--moss);}
.empty .big{font-size:34px;margin-bottom:8px;}

footer.note{text-align:center;font-size:11.5px;color:var(--moss);margin-top:30px;line-height:1.6;}

.bottom-nav{
  position:fixed;left:0;right:0;bottom:0;z-index:20;
  display:flex;justify-content:center;gap:10px;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  background:rgba(246,242,231,0.92);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);
}
.bn-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:8px 22px;cursor:pointer;color:var(--forest);box-shadow:var(--shadow);
  font-family:'Hind Siliguri';
}
.bn-btn span{font-size:11px;font-weight:600;}
.bn-btn:active{transform:scale(0.95);}
#app{padding-bottom:90px;}
.reset-link{
  margin-top:10px;background:none;border:none;color:var(--rust-deep);font-size:12px;
  font-family:'Hind Siliguri';font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0;
}

/* ---------- pagination ---------- */
.pager{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin:10px 0 16px;flex-wrap:wrap;
}
.pager-nav{
  display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--forest);
  font-family:'Hind Siliguri';cursor:pointer;box-shadow:var(--shadow);flex-shrink:0;
}
.pager-nav:disabled{opacity:.4;pointer-events:none;}
.pager-nums{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1;}
.pager-num{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);
  font-family:'JetBrains Mono';font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;
}
.pager-num.active{background:var(--forest);border-color:var(--forest);color:#fff;}

/* ---------- negative marking notice ---------- */
.neg-mark-note{
  background:#fbf0dd;border:1px solid var(--amber);border-radius:11px;padding:10px 13px;
  font-size:12.5px;color:#5a4419;line-height:1.6;
}
.neg-mark-note b{color:var(--rust-deep);}

/* ---------- exam builder unit toggles ---------- */
.unit-toggle-grid{display:flex;flex-direction:column;gap:8px;}
.unit-toggle{
  display:flex;align-items:center;gap:10px;text-align:right;
  background:var(--paper);border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;
  cursor:pointer;font-family:'Hind Siliguri';
}
.unit-toggle.active{background:#eaf3ec;border-color:var(--leaf);}
.unit-toggle .chk{
  width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;background:var(--card);
}
.unit-toggle.active .chk{background:var(--leaf);border-color:var(--leaf);}
.unit-toggle .ut-name{flex:1;font-size:13px;color:var(--ink);}
.unit-toggle .ut-count{font-size:11.5px;color:var(--moss);}

/* ---------- settings toggle switch ---------- */
.settings-toggle{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow);
}
.st-text{display:flex;flex-direction:column;gap:2px;}
.st-text b{font-size:13px;color:var(--ink);font-family:'Hind Siliguri';}
.st-text span{font-size:11.5px;color:var(--moss);line-height:1.4;}
.switch{
  flex-shrink:0;width:46px;height:26px;border-radius:20px;border:none;
  background:var(--line);position:relative;cursor:pointer;padding:0;transition:background .2s;
}
.switch.on{background:var(--leaf);}
.switch .knob{
  position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s;
}
.switch.on .knob{left:23px;}
</style>
</head>

িজেদের খাদ্য তৈরি করে। যেমন: সবুজ উদ্ভিদ, শৈবাল। খাদক (Consumers): এরা নিজেদের খাদ্য তৈরি করতে পারে না, বরং অন্য জীবকে খেয়ে শক্তি সংগ্রহ করে। খাদকদের বিভিন্ন স্তরে ভাগ করা যায়: প্রাথমিক খাদক (Primary Consumers/Herbivores): যারা সরাসরি উৎপাদকদের খাদ্য হিসেবে গ্রহণ করে (যেমন: গরু, ছাগল, হরিণ)। দ্বিতীয় স্তরের খাদক (Secondary Consumers/Carnivores or Omnivores): যারা প্রাথমিক খাদকদের খাদ্য হিসেবে গ্রহণ করে (যেমন: শেয়াল, ছোট মাছ, পাখি)। তৃ তীয় স্তরের খাদক (Tertiary Consumers/Top Carnivores): যারা দ্বিতীয় স্তরের খাদকদের খাদ্য হিসেবে গ্রহণ করে (যেমন: বাঘ, সিংহ, বড় সাপ)। বিয়োজক (Decomposers): এরা মৃত জীবদেহ এবং বর্জ ্য পদার্থকে পচিয়ে পুষ্টি উপাদান পরিবেশে ফিরিয়ে দেয়। যেমন: ব্যাকটেরিয়া ও ছত্রাক। অজৈব উপাদান (Abiotic Components): ইকোসিস্টেমের জড় বা অজীবিত অংশগুলো হলো অজৈব উপাদান। যেমন: সূর্যালোক, তাপমাত্রা, পানি, মাটি, বাতাস, খনিজ লবণ ইত্যাদি। জৈব ও অজৈব উপাদানগুলো একে অপরের উপর নির্ভ রশীল এবং এদের মধ্যে প্রতিনিয়ত শক্তি ও পদার্থের আদান-প্রদান ঘটে। খাদ্য শৃঙ্খল (Food Chain) খাদ্য শৃঙ্খল হলো একটি সরল পথ, যার মাধ্যেমেজ শক্তি এক জীব থেকে অন্য জীবে স্থানান্তরিত হয়। এটি দেখায়, কে কাকে খায়। একটি সাধারণ খাদ্য শৃঙ্খল শুরু হয় উৎপাদক থেকে এবং খাদকদের বিভিন্ন স্তর অতিক্রম করে। উদাহরণ: ঘাস (উৎপাদক) → হরিণ (প্রাথমিক খাদক) → বাঘ (দ্বিতীয় স্তরের খাদক) এখানে, ঘাস সূর্যালোক থেকে শক্তি গ্রহণ করে। হরিণ ঘাস খেয়ে সেই শক্তি পায়। বাঘ হরিণ খেয়ে শক্তি অর্জ ন করে। এভাবে শক্তি এক স্তর থেকে অন্য স্তরে প্রবাহিত হয়। খাদ্য জাল (Food Web) প্রকৃ তিতে খাদ্য শৃঙ্খলগুলো বিচ্ছিন্নভাবে কাজ করে না। বরং, একটি ইকোসিস্টেমে একাধিক খাদ্য শৃঙ্খল একে অপরের সাথে যুক্ত হয়ে একটি জটিল জাল তৈরি করে, যাকে খাদ্য জাল বলে। এটি একটি ইকোসিস্টেমে বিভিন্ন জীবের মধ্যে খাদ্য সম্পর্কে র জটিলতা দেখায়। উদাহরণ: একটি বনভূ মির খাদ্য জাল: ● ঘাসকে হরিণ, খরগোশ, ইঁদর ু খেতে পারে। ● খরগোশকে শেয়াল, বাঘ, বাজপাখি খেতে পারে। ● ইঁদর ু কে সাপ, পেঁচা, শেয়াল খেতে পারে। ● সাপকে বাজপাখি খেতে পারে। এখানে দেখা যাচ্ছে, একটি প্রাণী বিভিন্ন খাদ্য উৎস থেকে খাবার গ্রহণ করতে পারে এবং নিজেও একাধিক শিকারী প্রাণীর খাদ্য হতে পারে। খাদ্য জাল ইকোসিস্টেমের স্থিতিশীলতা বাড়ায়। যদি একটি খাদ্য উৎসের অভাব হয়, তাহলে প্রাণীগুলো বিকল্প খাদ্য উৎস খুজে ঁ নিতে পারে। বাস্তুতান্ত্রিক পিরামিড (Ecological Pyramid) বাস্তুতান্ত্রিক পিরামিড হলো একটি গ্রাফিক্যাল বা রেখাচিত্রভিত্তিক উপস্থাপনা, যা একটি বাস্তুতন্ত্রের বিভিন্ন পুষ্টি স্তরে (Trophic Levels) শক্তি, জীবভর বা সংখ্যা কীভাবে সজ্জিত থাকে, তা দেখায়। এই মডেলটি পরিবেশবিদ চার্লস এলটন (Charles Elton) ১৯২৭ সালে প্রথম প্রবর্ত ন করেন। সাধারণ গঠন (General Structure) পিরামিডটি সাধারণত নিম্নলিখিত নীতি অনুসরণ করে: ● ভিত্তি (Base): পিরামিডের সবচেয়ে নিচের বা বৃহত্তম স্তরটি হলো উৎপাদক (Producers), অর্থাৎ সবুজ উদ্ভিদ। ● উপরের স্তর (Higher Trophic Levels): এর উপরের স্তরগুলোতে থাকে ক্রমান্বয়ে প্রাথমিক খাদক (Primary Consumers), দ্বিতীয় স্তরের খাদক (Secondary Consumers) এবং সর্বোচ্চ স্তরের খাদক (Tertiary/Top Consumers)। ● আকার: বেশিরভাগ ক্ষেত্রেই পিরামিডের ভিত্তি সবচেয়ে চওড়া হয় এবং উপরের দিকে প্রতিটি স্তরে পরিমাণ কমতে থাকায় এটি একটি পিরামিডের আকার নেয়। পিরামিডের ভিত্তি নীতি: ১০% সূত্র (Ten Percent Law) বাস্তুতান্ত্রিক পিরামিডের আকার মূলত ১০% সূত্র দ্বারা নির্ধারিত হয়। এই সূত্র অনুযায়ী, একটি পুষ্টি স্তর থেকে পরের পুষ্টি স্তরে শক্তি স্থানান্তরের সময় মাত্র প্রায় ১০% শক্তি সঞ্চারিত হয়, এবং বাকি ৯০% শক্তি শ্বসন, তাপ বা অন্যান্য জৈবিক প্রক্রিয়ায় পরিবেশে হারিয়ে যায়। এই কারণে শক্তি স্থানান্তরের সাথে সাথে প্রতি স্তরে শক্তির পরিমাণ ক্রমশ হ্রাস পায়। বাস্তুতান্ত্রিক পিরামিডের প্রকারভেদ (Types of Ecological Pyramid) বাস্তুতন্ত্রের মধ্যে তিনটি প্রধান ধরনের পিরামিড রয়েছে: খাদ্য পিরামিড তিন প্রকারের হতে পারে"}, {"question": "পরিবেশতন্ত্র (Ecosystem) কী?", "options": ["শুধুমাত্র প্রাণিজগৎ", "শুধুমাত্র উদ্ভিদজগৎ", "জীব ও অজীব উপাদানের পারস্পরিক সম্পর্ক", "শুধুমাত্র জলবায়ু"], "correct": 2, "explanation": "Ecosystem হলো জীব ও অজীব উপাদানের সমন্বয়ে গঠিত একটি ক্রিয়াশীল একক।"}, {"question": "নিচের কোনটি একটি প্রাকৃ তিক পরিবেশতন্ত্র?", "options": ["বাগান", "পুকুর", "চাষের জমি", "অ্যাকোয়ারিয়াম"], "correct": 1, "explanation": "পুকুর একটি স্বাভাবিক ও প্রাকৃ তিক পরিবেশতন্ত্র, যেখানে সকল স্তরের <script>
/* ================= Data & Storage ================= */
const UNITS = JSON.parse(document.getElementById('app-data').textContent);
let CUSTOM_Q = {}; // unitId -> array (user-written questions)
let PROGRESS = {}; // unitId -> {seen:{}, correct:{}, exams:[]}
let EDITS = {}; // unitId -> { mcq: {key: {question,options,explanation,correct}} }
let MIXED_EXAMS = []; // array of {date, unitIds:[], score, total, took}
let storageReady = false;
const LS_KEYS = {progress:'bioapp_progress', custom:'bioapp_custom', edits:'bioapp_edits', mixed:'bioapp_mixed_exams', settings:'bioapp_settings'};
let SETTINGS = {moveAnsweredToEnd: false};

function lsGetArr(key){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : []; }
  catch(e){ return []; }
}

function lsGet(key){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : {}; }
  catch(e){ return {}; }
}
function lsSet(key, obj){
  try{ localStorage.setItem(key, JSON.stringify(obj)); return true; }
  catch(e){ return false; }
}
function storageAvailable(){
  try{ const t='__t__'; localStorage.setItem(t,'1'); localStorage.removeItem(t); return true; }
  catch(e){ return false; }
}
let STORAGE_OK = true;

async function loadStorage(){
  STORAGE_OK = storageAvailable();
  PROGRESS = lsGet(LS_KEYS.progress);
  CUSTOM_Q = lsGet(LS_KEYS.custom);
  EDITS = lsGet(LS_KEYS.edits);
  MIXED_EXAMS = lsGetArr(LS_KEYS.mixed);
  const s = lsGet(LS_KEYS.settings);
  SETTINGS = {moveAnsweredToEnd: false, ...s};
  storageReady = true;
}
async function saveProgress(){ lsSet(LS_KEYS.progress, PROGRESS); }
async function saveCustom(){ lsSet(LS_KEYS.custom, CUSTOM_Q); }
async function saveEdits(){ lsSet(LS_KEYS.edits, EDITS); }
async function saveMixedExams(){ lsSet(LS_KEYS.mixed, MIXED_EXAMS); }
async function saveSettings(){ lsSet(LS_KEYS.settings, SETTINGS); }

function ensureUnitEdits(uid){
  if(!EDITS[uid]) EDITS[uid] = {mcq:{}};
  if(!EDITS[uid].mcq) EDITS[uid].mcq = {};
  return EDITS[uid];
}
function ensureUnitProgress(uid){
  if(!PROGRESS[uid]) PROGRESS[uid] = {seen:{}, correct:{}, exams:[]};
  return PROGRESS[uid];
}
function allQuestionsFor(uid){
  const edits = (EDITS[uid]&&EDITS[uid].mcq) || {};
  const base = (UNITS.find(u=>u.id===uid).questions || []).map((q,i)=>{
    const k='p'+i; const e = edits[k];
    return {...q, ...(e||{}), _key:k, source:'pdf', edited: !!e, unitId:uid};
  });
  const custom = (CUSTOM_Q[uid]||[]).map((q,i)=>{
    const k='c'+i; const e = edits[k];
    return {...q, ...(e||{}), _key:k, source:'custom', edited: !!e, unitId:uid};
  });
  return base.concat(custom);
}

const STUDY_PAGE_SIZE = 15;

};

function nav(view, extra={}){
  state = {...state, view, ...extra};
  history.pushState({view, unitId: state.unitId}, '', '');
  render();
  window.scrollTo({top:0,behavior:'instant'});
}

window.addEventListener('popstate', (e)=>{
  if(state.view==='examRun'){
    const leave = confirm('পরীক্ষা বন্ধ করবেন? অগ্রগতি সংরক্ষিত হবে না।');
    if(!leave){
      history.pushState({view:'examRun', unitId: state.unitId}, '', '');
      return;
    }
    clearInterval(state.examTimer);
  }
  const s = e.state || {view:'home', unitId:null};
  state = {...state, view: s.view, unitId: s.unitId ?? null};
  render();
  window.scrollTo({top:0,behavior:'instant'});
});

function goHome(){
  history.pushState({view:'home', unitId:null}, '', '');
  state = {...state, view:'home', unitId:null};
  render();
  window.scrollTo({top:0,behavior:'instant'});
}

/* ================= Helpers ================= */
function pct(n,d){ return d? Math.round(n/d*100):0; }
function ringSVG(percent, size=52){
  const r=(size/2)-5, c=2*Math.PI*r, off=c*(1-percent/100);
  const color = percent>=70? 'var(--leaf)' : percent>=35? 'var(--amber)' : 'var(--line)';
  return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--paper-2)" stroke-width="5" fill="none"/>
  <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="5" fill="none" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>`;
}
function unitStudyPercent(uid){
  const total = allQuestionsFor(uid).length;
  if(!total) return 0;
  const prog = ensureUnitProgress(uid);
  return pct(Object.keys(prog.seen||{}).length, total);
}
function fmtTime(s){
  const m=Math.floor(s/60), sec=s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function esc(s){ return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function autosizeTextareas(){
  document.querySelectorAll('.edit-field textarea').forEach(t=>{
    const resize = ()=>{ t.style.height='auto'; t.style.height=(t.scrollHeight+2)+'px'; };
    t.addEventListener('input', resize);
    resize();
  });
}

/* ================= STUDY / PRACTICE ================= */
function studyHTML(){
  const u = UNITS.find(x=>x.id===state.unitId);
  let qs = allQuestionsFor(u.id);
  const prog = ensureUnitProgress(u.id);
  if(!qs.length) return emptyHTML('এখনো কোনো প্রশ্ন নেই এই ইউনিটে। "নিজের প্রশ্ন যোগ করো" দিয়ে শুরু করতে পারো।');
  const labels=['ক','খ','গ','ঘ'];

  if(SETTINGS.moveAnsweredToEnd){
    const pendingKey = state.pendingAnswerKey[u.id];
    const unanswered = [], answered = [];
    qs.forEach(q=>{
      const isAnswered = prog.seen && prog.seen[q._key]!==undefined;
      if(!isAnswered || q._key===pendingKey) unanswered.push(q);
      else answered.push(q);
    });
    qs = unanswered.concat(answered);
  }

  const totalPages = Math.max(1, Math.ceil(qs.length / STUDY_PAGE_SIZE));
  const page = Math.min(Math.max(1, state.studyPage||1), totalPages);
  const startIdx = (page-1)*STUDY_PAGE_SIZE;
  const pageQs = qs.slice(startIdx, startIdx+STUDY_PAGE_SIZE);

  const pagerHTML = totalPages>1 ? `<div class="pager">
    <button class="pager-nav" id="pg-prev" ${page===1?'disabled':''}>${ICO.back} আগের</button>
    <div class="pager-nums">
      ${Array.from({length:totalPages}, (_,i)=>i+1).map(n=>`<button class="pager-num ${n===page?'active':''}" data-p="${n}">${n}</button>`).join('')}
    </div>
    <button class="pager-nav" id="pg-next" ${page===totalPages?'disabled':''}>পরের ${ICO.fwd}</button>
  </div>` : '';

  const toggleHTML = `<div class="settings-toggle">
    <div class="st-text"><b>উত্তর দেওয়া প্রশ্ন লিস্টের শেষে যাবে</b><span>একটি প্রশ্নের ব্যাখ্যা পড়ার সময় দিয়ে, পরের প্রশ্নের উত্তর দিলে তবেই আগেরটি শেষে চলে যাবে</span></div>
    <button class="switch ${SETTINGS.moveAnsweredToEnd?'on':''}" id="toggle-move-end"><span class="knob"></span></button>
  </div>`;

  return `<div class="section-label">সব প্রশ্ন (${qs.length}টি) — পেজ ${page}/${totalPages}, উত্তরে ট্যাপ করো</div>
    ${toggleHTML}
    ${pagerHTML}
    ${pageQs.map((q,pidx)=>{
      const idx = startIdx+pidx;
      if(state.editOpen.has(q._key)) return editFormHTML(q, idx);
      const answered = prog.seen && prog.seen[q._key]!==undefined;
      const selected = answered? prog.seen[q._key] : null;
      return `<div class="qcard" data-key="${q._key}">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span class="qnum font-mono">প্রশ্ন ${idx+1}${q.source==='custom'?' <span class="ai-badge" style="margin-right:0;margin-left:6px;">নিজের</span>':''}${q.edited?' <span class="ai-badge" style="background:#fbf0dd;color:var(--amber-deep);margin-right:0;margin-left:6px;">এডিট করা</span>':''}</span>
          <button class="edit-btn" data-key="${q._key}" title="এডিট করো">${ICO.edit}</button>
        </div>
        <div class="qtext">${esc(q.question)}</div>
        <div class="opts">
        ${q.options.map((opt,oi)=>{
          let cls='opt-btn';
          if(answered){
            if(oi===q.correct) cls+=' correct';
            else if(oi===selected) cls+=' wrong';
            else cls+=' dim';
          }
          return `<div class="opt-row"><button class="${cls}" data-oi="${oi}"><span class="lbl">${labels[oi]}</span> ${esc(opt)}</button></div>`;
        }).join('')}
        </div>
        ${answered? `<div class="explain"><b>ব্যাখ্যা:</b> ${esc(q.explanation||'কোনো ব্যাখ্যা দেওয়া নেই।')}</div>`:''}
      </div>`;
    }).join('')}
    ${pagerHTML}
  `;
}

function attachStudy(){
  const u = UNITS.find(x=>x.id===state.unitId);
  const moveToggle = document.getElementById('toggle-move-end');
  if(moveToggle) moveToggle.onclick = async ()=>{
    SETTINGS.moveAnsweredToEnd = !SETTINGS.moveAnsweredToEnd;
    await saveSettings();
    render();
  };
  document.querySelectorAll('.pager-num').forEach(btn=>{
    btn.onclick = ()=>{ state.studyPage = Number(btn.dataset.p); render(); window.scrollTo({top:0,behavior:'instant'}); };
  });
  const pgPrev = document.getElementById('pg-prev');
  if(pgPrev) pgPrev.onclick = ()=>{ state.studyPage = Math.max(1,(state.studyPage||1)-1); render(); window.scrollTo({top:0,behavior:'instant'}); };
  const pgNext = document.getElementById('pg-next');
  if(pgNext) pgNext.onclick = ()=>{ state.studyPage = (state.studyPage||1)+1; render(); window.scrollTo({top:0,behavior:'instant'}); };
  document.querySelectorAll('.edit-btn').forEach(btn=>{
    btn.onclick = ()=>{ state.editOpen.add(btn.dataset.key); render(); };
  });
  attachEditCards(u.id);
  document.querySelectorAll('.qcard:not(.edit-card)').forEach(card=>{
    const key = card.dataset.key;
    card.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.onclick = async ()=>{
        const oi = Number(btn.dataset.oi);
        const qs = allQuestionsFor(u.id);
        const q = qs.find(x=>x._key===key);
        const prog = ensureUnitProgress(u.id);
        prog.seen[key] = oi;
        if(oi===q.correct) prog.correct[key]=true; else delete prog.correct[key];
        state.pendingAnswerKey[u.id] = key;
        await saveProgress();
        const scrollY = window.scrollY;
        render();
        window.scrollTo({top:scrollY, behavior:'instant'});
      };
    });
  });
}
function attachEditCards(uid){
  document.querySelectorAll('.edit-card').forEach(card=>{
    const key = card.dataset.key;
    card.querySelectorAll('.correct-pill').forEach(p=>{
      p.onclick = ()=>{
        card.querySelectorAll('.correct-pill').forEach(x=>x.classList.remove('active'));
        p.classList.add('active');
      };
    });
    card.querySelector('[data-act="cancel"]').onclick = ()=>{ state.editOpen.delete(key); render(); };
    const resetBtn = card.querySelector('[data-act="reset"]');
    if(resetBtn) resetBtn.onclick = async ()=>{
      const edits = ensureUnitEdits(uid);
      delete edits.mcq[key];
      state.editOpen.delete(key);
      await saveEdits();
      render();
    };
    card.querySelector('[data-act="save"]').onclick = async ()=>{
      const edits = ensureUnitEdits(uid);
      const question = card.querySelector('[data-f="question"]').value.trim();
      const options = [0,1,2,3].map(i=>card.querySelector(`[data-f="opt${i}"]`).value.trim());
      const explanation = card.querySelector('[data-f="explanation"]').value.trim();
      const correctSel = card.querySelector('.correct-pill.active');
      const correct = correctSel? Number(correctSel.dataset.oi) : 0;
      if(!question || options.some(o=>!o)){ alert('প্রশ্ন ও সবগুলো অপশন লিখতে হবে।'); return; }
      edits.mcq[key] = {question, options, explanation, correct};
      state.editOpen.delete(key);
      await saveEdits();
      render();
    };
  });
}

function attachExamConfig(){
  const u = UNITS.find(x=>x.id===state.unitId);
  const total = allQuestionsFor(u.id).length;
  if(!state._examCount) state._examCount = Math.min(10,total);
  document.querySelectorAll('#count-pills .pill').forEach(p=>{
    p.onclick = ()=>{ state._examCount = Number(p.dataset.n); render(); };
  });
  document.getElementById('btn-start-exam').onclick = ()=>{
    const qs = shuffle(allQuestionsFor(u.id)).slice(0, state._examCount);
    const total_seconds = qs.length*45;
    state.examQueue = qs;
    state.examAnswers = {};
    state.examIndex = 0;
    state.examTotalSeconds = total_seconds;
    state.examSecondsLeft = total_seconds;
    state.examMode = 'unit';
    state.examUnitIds = [u.id];
    nav('examRun',{unitId:u.id});
    startExamTimer();
  };
}
function startExamTimer(){
  clearInterval(state.examTimer);
  state.examTimer = setInterval(()=>{
    state.examSecondsLeft--;
    if(state.examSecondsLeft<=0){
      clearInterval(state.examTimer);
      finishExam();
      return;
    }
    const t = document.getElementById('exam-timer-txt');
    if(t) t.textContent = fmtTime(state.examSecondsLeft);
    const fill = document.getElementById('exam-progress-fill');
    if(fill) fill.style.width = (100*(1-state.examSecondsLeft/state.examTotalSeconds))+'%';
  },1000);
}

  </div>
  <div class="qcard">

    <div class="qtext">${esc(q.question)}</div>
    <div>
    ${q.options.map((opt,oi)=>`<button class="exam-opt ${selected===oi?'selected':''}" data-oi="${oi}"><span class="lbl" style="margin-left:10px;">${labels[oi]}</span> ${esc(opt)}</button>`).join('')}

function attachExamRun(){
  document.querySelectorAll('.exam-opt').forEach(btn=>{
    btn.onclick = ()=>{
      state.examAnswers[state.examIndex] = Number(btn.dataset.oi);
      render();
    };
  });
  const prev = document.getElementById('btn-prev');
  if(prev) prev.onclick = ()=>{ state.examIndex--; render(); };
  const next = document.getElementById('btn-next');
  if(next) next.onclick = ()=>{ state.examIndex++; render(); };
  const sub = document.getElementById('btn-submit');
  if(sub) sub.onclick = ()=>{ if(confirm('পরীক্ষা জমা দিতে চাও?')) finishExam(); };
}
async function finishExam(){
  clearInterval(state.examTimer);
  const qs = state.examQueue;
  let correctCount=0, wrongCount=0, skipped=0;
  const review = qs.map((q,i)=>{
    const sel = state.examAnswers[i];
    const answered = sel!==undefined;
    const ok = sel===q.correct;
    if(!answered) skipped++;
    else if(ok) correctCount++;
    else wrongCount++;
    return {question:q.question, options:q.options, correct:q.correct, selected: sel===undefined?-1:sel, explanation:q.explanation, ok, answered};
  });
  const rawScore = correctCount - wrongCount*NEG_MARK;
  const score = Math.round(rawScore*100)/100;
  const took = state.examTotalSeconds - state.examSecondsLeft;

  if(state.examMode==='mixed'){
    MIXED_EXAMS.push({date:new Date().toISOString(), unitIds: state.examUnitIds, score, total:qs.length, took, correctCount, wrongCount, skipped});
    await saveMixedExams();
  }else{
    const prog = ensureUnitProgress(state.unitId);
    prog.exams = prog.exams || [];
    prog.exams.push({date:new Date().toISOString(), score, total:qs.length, took, correctCount, wrongCount, skipped});
    await saveProgress();
  }
  // mark seen/correct on each question's home unit regardless of exam mode
  qs.forEach((q,i)=>{
    const sel = state.examAnswers[i];
    const owner = q.unitId || state.unitId;
    if(sel!==undefined && owner){
      const p = ensureUnitProgress(owner);
      p.seen[q._key]=sel; if(sel===q.correct) p.correct[q._key]=true; else delete p.correct[q._key];
    }
  });
  await saveProgress();
  state.examResult = {score, total: qs.length, took, review, correctCount, wrongCount, skipped};
  nav('examResult',{unitId: state.examMode==='mixed'? null : state.unitId});
}

  return (Math.round(n*100)/100).toString().replace(/\.?0+$/,'') || '0';
}

  return `

      <div class="row correct-ans">সঠিক উত্তর: ${labels[x.correct]}) ${esc(x.options[x.correct])}</div>

        const n = allQuestionsFor(u.id).length;
        const active = state.builderUnits.has(u.id);
        return `<button class="unit-toggle ${active?'active':''}" data-uid="${u.id}" ${n===0?'style="opacity:.4;"':''}>
          <span class="chk">${active?ICO.check:''}</span>
          <span class="ut-name">ইউনিট ${u.id}: ${esc(u.name)}</span>
          <span class="ut-count font-mono">${n}</span>
        </button>`;
      }).join('')}
    </div>
    <p style="font-size:12.5px;color:var(--moss);margin:14px 0 6px;">নির্বাচিত ইউনিট থেকে মোট উপলব্ধ প্রশ্ন: <b style="color:var(--forest);">${poolSize}</b>টি</p>
    <div class="neg-mark-note">⚠️ ভুল উত্তরে <b>-০.২৫</b> নম্বর কাটা যাবে। উত্তর না দিলে কোনো নম্বর কাটা হবে না।</div>
    <div style="font-size:13px;font-weight:600;margin:14px 0 6px;">কতটি প্রশ্ন?</div>
    <div class="pill-row" id="builder-count-pills">
      ${countOpts.map(n=>`<button class="pill ${n===chosen?'active':''}" data-n="${n}">${n===poolSize?'সব ('+poolSize+')':n}</button>`).join('')}
      ${!countOpts.length? '<span style="font-size:12.5px;color:var(--rust-deep);">অন্তত একটি ইউনিট বেছে নাও যাতে প্রশ্ন থাকে</span>':''}
    </div>
    <button class="big-btn" id="btn-start-builder-exam" ${!poolSize?'disabled style="opacity:.5;"':''}>পরীক্ষা শুরু করো</button>
  </div>`;
}
function attachExamBuilder(){
  document.querySelectorAll('.unit-toggle').forEach(btn=>{
    btn.onclick = ()=>{
      const uid = Number(btn.dataset.uid);
      if(state.builderUnits.has(uid)) state.builderUnits.delete(uid);
      else state.builderUnits.add(uid);
      state._builderCount = null;
      render();
    };
  });
  document.querySelectorAll('#builder-count-pills .pill').forEach(p=>{
    p.onclick = ()=>{ state._builderCount = Number(p.dataset.n); render(); };
  });
  const startBtn = document.getElementById('btn-start-builder-exam');
  if(startBtn) startBtn.onclick = ()=>{
    const unitIds = UNITS.filter(u=>state.builderUnits.has(u.id)).map(u=>u.id);
    let pool = [];
    unitIds.forEach(uid=>{ pool = pool.concat(allQuestionsFor(uid)); });
    const poolSize = pool.length;
    const count = state._builderCount || Math.min(25, poolSize);
    if(!poolSize || !count) return;
    const qs = shuffle(pool).slice(0, count);
    const total_seconds = qs.length*45;
    state.examQueue = qs;
    state.examAnswers = {};
    state.examIndex = 0;
    state.examTotalSeconds = total_seconds;
    state.examSecondsLeft = total_seconds;
    state.examMode = 'mixed';
    state.examUnitIds = unitIds;
    nav('examRun',{unitId:null});
    startExamTimer();
  };
}

/* ================= EMPTY ================= */
function emptyHTML(msg){
  return `<div class="empty"><div class="big">🌱</div>${esc(msg)}</div>`;
}

/* ================= Boot ================= */
(async function boot(){
  document.getElementById('app').innerHTML = `<div class="empty"><div class="big">🌿</div>লোড হচ্ছে...</div>`;
  history.replaceState({view:'home', unitId:null}, '', '');
  await loadStorage();
  render();
})();

</script>
